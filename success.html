<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.min.css">
    <title>Document</title>
</head>
<body>


<header class="header">
    <div class="container">
        <div class="header__inner">
            <div class="header__logo">
                <img class="header__logo-img" src="img/logo.png" alt="/">
            </div>
            <nav class="header__nav nav">
                <ul class="nav__list">
                    <li class="nav__link">
                        <a href="#" class="nav__link-item">ВКонтакте</a>
                    </li>
                    <li class="nav__link">
                        <a href="#" class="nav__link-item nav__link-item--telegram">Телеграм</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</header>


<section class="success">
    <div class="container">
        <div class="success__inner">
                <img class="success__img" src="img/img.png" alt="/">
            <div class="sent">
                <h3 class="sent__title">
                    Заявка отправлена
                </h3>
                <div class="sent__text">
                    Спасибо, мы свяжемся с вами в&nbsp;ближайшее время!
                </div>
            </div>
        </div>
    </div>
</section>







<footer class="footer">
    <div class="container">
        <div class="footer__inner">
            <div class="footer__copyright">
                <span class="footer__text"><a class="footer__link" href="mailto:info@instasale.store"> Почта: info@instasale.store</a></span>
                <span class="footer__text"> <a class="footer__link" href="#" target="_blank"> Политика конфиденциальности</a>
                </span>
            </div>
            <div class="footer__logo">
                <img src="img/logoBottom.png" alt="">
            </div>
        </div>
    </div>
</footer>




<script src="js/script.js"></script>

</body>
</html>
