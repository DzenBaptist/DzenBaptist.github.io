<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <title>Webinar</title><link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
    <meta name="format-detection" content="telephone=no">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script><script type="text/javascript" src="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

  <body>
      <main class="wrapper">
          <section class="firstscreen firstscreen_darkblue">
            <div class="firstscreen__information firstscreen__information_blue">
              <div class="firstscreen__info firstscreen__info_big">
                <h1 class="firstscreen__title">Бесплатный вас за&nbsp;регистрацию!</h1>
                <h2 class="firstscreen__subtitle">Мы уже отправили на вашу почту подтверждение регистрации и подарок — проверьте свою почту!</h2>
                <p class="firstscreen__text">Перед проведением вебинара мы также напомним вам о нём по электронной почте.</p><a class="firstscreen__link" href="/">Вернуться на сайт</a>
              </div>
            </div>
            <div class="firstscreen__doctor"><img class="firstscreen__doctorpict firstscreen__doctorpict_big" src="img/doctor.png" alt="Вебинар">
              <p class="firstscreen__doctortext">Как терять вес, не прибегая к&nbsp;изматывающим диетам?</p>
            </div>
          </section>
      </main>
    <script src="js/scripts.js"></script>
  </body>
